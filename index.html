<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .spotify-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1db954 0%, #1ed760 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);
        }

        .spotify-icon svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1c1e21;
        }

        .subtitle {
            font-size: 15px;
            color: #65676b;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: #f5f6f7;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1db954;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(29, 185, 84, 0.1);
        }

        input[type="text"]::placeholder {
            color: #8a8d91;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1db954 0%, #1ed760 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: linear-gradient(135deg, #b8b8b8 0%, #8f8f8f 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }

        .status.loading {
            color: #65676b;
        }

        .status.error {
            color: #e41e3f;
            background: #ffebee;
            padding: 12px;
            border-radius: 8px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .status.success {
            color: #00a400;
        }

        .result-card {
            background: #f5f6f7;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .track-info {
            margin-bottom: 12px;
        }

        .track-title {
            font-size: 16px;
            font-weight: 600;
            color: #1c1e21;
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 14px;
            color: #65676b;
        }

        .download-btn {
            display: inline-block;
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #1db954 0%, #1aa34a 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);
            text-align: center;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(29, 185, 84, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #65676b;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            input[type="text"], .btn {
                font-size: 14px;
            }

            .spotify-icon {
                width: 56px;
                height: 56px;
            }

            .spotify-icon svg {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="spotify-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
            </div>
            <h1>Spotify Downloader</h1>
            <p class="subtitle">Download tracks and playlists in high quality</p>
        </div>

        <div class="input-group">
            <input 
                type="text" 
                id="urlInput" 
                placeholder="Paste Spotify track or playlist URL here..."
                autocomplete="off"
            >
        </div>

        <button class="btn" id="downloadBtn">Download</button>

        <div class="status" id="status"></div>
    </div>

    <footer>
        © 2026 | Siegfried Samá
    </footer>

    <script>
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');

        downloadBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();

            // Clear previous status
            status.className = 'status';
            status.innerHTML = '';

            // Validate input
            if (!url) {
                status.className = 'status error';
                status.textContent = '⚠️ Please enter a Spotify URL';
                return;
            }

            if (!url.includes('spotify.com')) {
                status.className = 'status error';
                status.textContent = '⚠️ Invalid Spotify URL';
                return;
            }

            // Show loading state
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<span class="spinner"></span>Processing...';
            status.className = 'status loading';
            status.textContent = '⏳ Fetching track...';

            try {
                const encodedUrl = encodeURIComponent(url);
                const apiUrl = `https://kryptonite-api-library.onrender.com/api/sp-dl?url=${encodedUrl}`;

                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                // Check if response is ok
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('API Response:', data);

                // Check if API returned success
                if (!data.status || !data.trackData || data.trackData.length === 0) {
                    throw new Error('No track data available');
                }

                // Get track data from the first item in trackData array
                const track = data.trackData[0];
                const downloadUrl = track.download_url;
                const title = track.name;
                const artist = track.artists;
                const duration = track.duration;

                // Show track info
                status.className = 'status success';
                let resultHTML = '<div class="result-card">';
                
                resultHTML += '<div class="track-info">';
                
                if (title) {
                    resultHTML += `<div class="track-title">${title}</div>`;
                }
                
                if (artist) {
                    resultHTML += `<div class="track-artist">${artist}</div>`;
                }
                
                if (duration) {
                    resultHTML += `<div class="track-artist">Duration: ${duration}</div>`;
                }
                
                resultHTML += '</div>';
                
                // Check if download is available
                if (downloadUrl && downloadUrl !== null) {
                    resultHTML += `<a href="${downloadUrl}" class="download-btn" download target="_blank">🎵 Download Track</a>`;
                } else {
                    resultHTML += `<div style="padding: 14px; background: #fff3cd; color: #856404; border-radius: 10px; text-align: center; font-weight: 600;">⚠️ Download not available for this track</div>`;
                }
                
                resultHTML += '</div>';
                
                status.innerHTML = resultHTML;

                downloadBtn.disabled = false;
                downloadBtn.textContent = 'Download';

            } catch (error) {
                console.error('Error details:', error);
                status.className = 'status error';
                status.textContent = '❌ ' + error.message;
                downloadBtn.disabled = false;
                downloadBtn.textContent = 'Download';
            }
        });

        // Allow Enter key to trigger download
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                downloadBtn.click();
            }
        });
    </script>
</body>
</html>
